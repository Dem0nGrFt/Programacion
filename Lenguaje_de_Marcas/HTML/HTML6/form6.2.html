<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>

    <h2>Formulario</h2>

    <form action="#" method="post">
        <!-- Nombre -->
        <label for="nombre">Nombre*:</label>
        <input type="text" id="nombre" name="nombre" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]+" title="Solo se permite la introducción de letras" required tabindex="1">
        <br><br>

        <!-- Correo electrónico -->
        <label for="email">Correo electrónico*:</label>
        <input type="email" id="email" name="email" placeholder="ejemplo@dominio.com" required tabindex="2" autofocus>
        <br><br>

        <!-- URL -->
        <label for="url">URL:</label>
        <input type="url" id="url" name="url" placeholder="Escribe la URL de tu página" tabindex="3">
        <br><br>

        <!-- Fecha -->
        <label for="fecha">Fecha:</label>
        <input type="date" id="fecha" name="fecha" disabled>
        <br><br>

        <!-- Número -->
        <label for="numero">Número (min -10, max 10):</label>
        <input type="number" id="numero" name="numero" min="-10" max="10" step="2" tabindex="4">
        <br><br>

        <!-- Teléfono -->
        <label for="telefono">Teléfono*:</label>
        <input type="tel" id="telefono" name="telefono" pattern="[0-9]{9}" title="Debe contener 9 dígitos" required tabindex="5">
        <br><br>

        <!-- Color favorito -->
        <label for="color">Color favorito:</label>
        <input type="color" id="color" name="color">
        <br><br>

        <input type="submit" value="Enviar">
    </form>

</body>
</html>
