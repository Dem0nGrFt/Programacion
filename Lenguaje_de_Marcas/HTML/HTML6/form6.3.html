<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario en Tabla</title>
</head>
<body>

    <h2>Formulario</h2>

    <form action="#" method="post">
        <table border="1">
            <tr>
                <th colspan="2">Datos</th>
            </tr>
            <tr>
                <td><label for="nombre">Nombre*:</label></td>
                <td><input type="text" id="nombre" name="nombre" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]+" title="Solo se permite la introducción de letras" required tabindex="1"></td>
            </tr>
            <tr>
                <td><label for="email">Correo electrónico*:</label></td>
                <td><input type="email" id="email" name="email" placeholder="ejemplo@dominio.com" required tabindex="2" autofocus></td>
            </tr>
            <tr>
                <td><label for="url">URL:</label></td>
                <td><input type="url" id="url" name="url" placeholder="Escribe la URL de tu página" tabindex="3"></td>
            </tr>
            <tr>
                <td><label for="fecha">Fecha:</label></td>
                <td><input type="date" id="fecha" name="fecha" disabled></td>
            </tr>
            <tr>
                <td><label for="numero">Número (min -10, max 10):</label></td>
                <td><input type="number" id="numero" name="numero" min="-10" max="10" step="2" tabindex="4"></td>
            </tr>
            <tr>
                <td><label for="telefono">Teléfono*:</label></td>
                <td><input type="tel" id="telefono" name="telefono" pattern="[0-9]{9}" title="Debe contener 9 dígitos" required tabindex="5"></td>
            </tr>
            <tr>
                <td><label for="color">Color favorito:</label></td>
                <td><input type="color" id="color" name="color"></td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Enviar">
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
